name: "Claude AutoFix"
description: "Automatically analyses and fixes failing Python tests using Claude AI"

branding:
  icon: "cpu"
  color: "orange"

inputs:
  anthropic-api-key:
    description: "Anthropic API key (ANTHROPIC_API_KEY)"
    required: true
  max-fixes:
    description: "Maximum number of fixes per run"
    required: false
    default: "5"
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  create-pr:
    description: "Automatically create a Pull Request with the fixes (true/false)"
    required: false
    default: "true"

outputs:
  fixes-applied:
    description: "Number of fixes successfully applied"
    value: ${{ steps.summary.outputs.fixes_applied }}
  pr-url:
    description: "URL of the Pull Request created with the fixes"
    value: ${{ steps.create_pr.outputs.pr_url }}

runs:
  using: "composite"
  steps:

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-json-report

    - name: Run tests and generate report
      shell: bash
      continue-on-error: true
      run: |
        pytest --json-report || true

    - name: Check for test failures
      id: check
      shell: bash
      run: |
        if [ ! -f ".report.json" ]; then
          echo "failures=0" >> $GITHUB_OUTPUT
          echo "Test report not found."
          exit 0
        fi
        FAILURES=$(python3 -c "
        import json
        data = json.load(open('.report.json'))
        print(sum(1 for t in data.get('tests', []) if t.get('outcome') == 'failed'))
        ")
        echo "failures=${FAILURES}" >> $GITHUB_OUTPUT
        echo "Failing tests found: ${FAILURES}"

    - name: Analyse failures with Claude AI
      id: analyse
      if: steps.check.outputs.failures != '0'
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        python ${{ github.action_path }}/ci/claude_report.py \
          --report .report.json \
          --comment-file claude_comment.md

    - name: Post analysis comment on PR
      if: steps.check.outputs.failures != '0' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ github.token }}
        script: |
          const fs = require('fs');
          const commentPath = 'claude_comment.md';
          if (!fs.existsSync(commentPath)) {
            core.info('No analysis comment file found, skipping.');
            return;
          }
          const body = fs.readFileSync(commentPath, 'utf8').trim();
          if (!body) {
            core.info('Analysis comment file is empty, skipping.');
            return;
          }
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body,
          });
          core.info('Claude analysis comment posted to PR.');

    - name: Generate and apply fixes with Claude AI
      id: fix
      if: steps.check.outputs.failures != '0'
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        python ${{ github.action_path }}/ci/claude_fix.py \
          --report .report.json \
          --apply \
          --max-fixes ${{ inputs.max-fixes }}

    - name: Check for generated changes
      id: changes
      shell: bash
      run: |
        if git diff --quiet; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected:"
          git diff --name-only
        fi

    - name: Configure git
      if: steps.changes.outputs.has_changes == 'true'
      shell: bash
      run: |
        git config user.name "Claude AutoFix Bot"
        git config user.email "claude-autofix@users.noreply.github.com"

    - name: Create fix branch and commit
      id: commit
      if: steps.changes.outputs.has_changes == 'true'
      shell: bash
      run: |
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        BRANCH="claude-auto-fix-${TIMESTAMP}"
        echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
        git checkout -b "${BRANCH}"
        git add -u
        git commit -m "fix: apply Claude AI automated fixes for failing tests"
        git push origin "${BRANCH}"

    - name: Create Pull Request with fixes
      id: create_pr
      if: steps.changes.outputs.has_changes == 'true' && inputs.create-pr == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        BASE_BRANCH="${{ github.head_ref || github.ref_name }}"
        PR_URL=$(gh pr create \
          --title "🤖 Claude AutoFix: automated fixes for failing tests" \
          --body "## 🤖 Claude AutoFix

        This PR was automatically created by [Claude AutoFix Action](https://github.com/${{ github.action_repository }}).

        ### What was done
        - Failing tests were analysed by Claude AI
        - Fixes were generated and applied automatically

        ### Next steps
        1. Review the changes carefully
        2. Run the tests locally to confirm the fixes
        3. Merge if everything looks correct

        ### Details
        - Triggered by: \`${{ github.event_name }}\`
        - Source branch: \`${BASE_BRANCH}\`
        - Workflow run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

        ---
        🤖 Generated with [Claude AutoFix](https://github.com/${{ github.action_repository }})" \
          --base "${BASE_BRANCH}" \
          --head "${{ steps.commit.outputs.branch }}")
        echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT
        echo "Fix PR created: ${PR_URL}"

    - name: Post fix PR link on original PR
      if: steps.changes.outputs.has_changes == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ github.token }}
        script: |
          const fixPrUrl = '${{ steps.create_pr.outputs.pr_url }}';
          const body = `## 🤖 Claude AutoFix

          A new PR has been created with automated fixes for the failing tests detected in this PR.

          🔗 **Fix PR**: ${fixPrUrl}

          The fixes were generated by Claude AI based on the test failure analysis.
          Please review the changes carefully before merging.`;

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body,
          });
          core.info('Fix PR link posted to original PR.');

    - name: Execution summary
      id: summary
      if: always()
      shell: bash
      run: |
        FIXES=0
        if [ -f "claude-patches/summary.json" ]; then
          FIXES=$(python3 -c "import json; d=json.load(open('claude-patches/summary.json')); print(d.get('successful', 0))")
        fi
        echo "fixes_applied=${FIXES}" >> $GITHUB_OUTPUT
        echo "### Claude AutoFix" >> $GITHUB_STEP_SUMMARY
        echo "- Failing tests: ${{ steps.check.outputs.failures }}" >> $GITHUB_STEP_SUMMARY
        echo "- Fixes applied: ${FIXES}" >> $GITHUB_STEP_SUMMARY
        if [ -n "${{ steps.create_pr.outputs.pr_url }}" ]; then
          echo "- Fix PR: ${{ steps.create_pr.outputs.pr_url }}" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload patches as artifact
      if: always()
      uses: actions/upload-artifact@v4
      continue-on-error: true
      with:
        name: claude-patches
        path: claude-patches/
        retention-days: 7
        if-no-files-found: ignore
