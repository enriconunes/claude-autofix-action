name: Gemini Auto-Fix

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the failed workflow (optional)'
        required: false
  workflow_run:
    workflows: ["Gemini Assisted CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    # Only run if the previous workflow failed or if manually triggered
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure')

    steps:
      - name: Get source branch from failed workflow
        id: get_branch
        run: |
          # Try to get the branch from the workflow_run event
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Get the head branch from the workflow run
            HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
            echo "source_branch=${HEAD_BRANCH}" >> $GITHUB_OUTPUT
            echo "Found source branch: ${HEAD_BRANCH}"
          else
            # For manual dispatch, use current branch
            HEAD_BRANCH="${{ github.ref_name }}"
            echo "source_branch=${HEAD_BRANCH}" >> $GITHUB_OUTPUT
            echo "Using current branch: ${HEAD_BRANCH}"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Checkout the source branch (the one that failed)
          ref: ${{ steps.get_branch.outputs.source_branch }}
          # Need to fetch full history for git operations
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report

      - name: Run tests to generate report
        continue-on-error: true
        run: |
          echo "Running tests to generate failure report..."
          pytest --json-report || true

      - name: Check if report exists and has failures
        id: check_report
        run: |
          if [ ! -f ".report.json" ]; then
            echo "report_exists=false" >> $GITHUB_OUTPUT
            echo "❌ Test report not found"
            exit 0
          fi

          echo "report_exists=true" >> $GITHUB_OUTPUT
          echo "✓ Test report found"

          # Check if there are actually failures
          FAILURES=$(python3 -c 'import json; data=json.load(open(".report.json")); print(sum(1 for t in data.get("tests", []) if t.get("outcome") == "failed"))' 2>/dev/null || echo "0")
          echo "failure_count=${FAILURES}" >> $GITHUB_OUTPUT
          echo "Found ${FAILURES} test failure(s)"

          if [ "$FAILURES" -eq 0 ]; then
            echo "ℹ️  No test failures to fix"
          fi

      - name: Generate and apply fixes
        if: steps.check_report.outputs.report_exists == 'true' && steps.check_report.outputs.failure_count != '0'
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        continue-on-error: true
        run: |
          echo "Generating fixes with Gemini..."
          python ci/gemini_fix.py --report .report.json --apply --max-fixes 5 || {
            echo "⚠️  gemini_fix.py exited with error, but continuing to check for changes"
            exit 0
          }

      - name: Check patches directory
        run: |
          if [ -d "gemini-patches" ]; then
            echo "✓ gemini-patches directory exists"
            ls -la gemini-patches/
          else
            echo "⚠️  gemini-patches directory not found"
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✓ Code changes detected"
            git status --short
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes were made"
          fi

      - name: Configure git
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "Gemini Auto-Fix Bot"
          git config user.email "gemini-bot@users.noreply.github.com"

      - name: Create fix branch and commit
        if: steps.check_changes.outputs.has_changes == 'true'
        id: create_branch
        run: |
          # Generate unique branch name
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH_NAME="gemini-auto-fix-${TIMESTAMP}"
          echo "branch_name=${BRANCH_NAME}" >> $GITHUB_OUTPUT

          # Create and switch to new branch
          git checkout -b "${BRANCH_NAME}"

          # Add all changes
          git add .

          # Create commit with details
          git commit -m "fix: Apply Gemini-suggested fixes for failing tests

          This PR was automatically created by the Gemini Auto-Fix workflow.

          Gemini AI analyzed failing tests and generated patches to fix them.
          Check the PR description for details about which patches were applied.

          🤖 Generated with Gemini AI
          "

          echo "✓ Commit created on branch ${BRANCH_NAME}"

      - name: Push branch
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git push origin ${{ steps.create_branch.outputs.branch_name }}
          echo "✓ Branch pushed to remote"

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build PR body
          PR_BODY="## 🤖 Gemini Auto-Fix

          This PR contains automated fixes suggested by Gemini AI for failing tests.

          ### Summary
          "

          # Add patch details from summary (simplified)
          if [ -f "gemini-patches/summary.json" ]; then
            PR_BODY="${PR_BODY}
          See the gemini-patches artifact for details about which patches were generated.

          "
          fi

          PR_BODY="${PR_BODY}

          ### 📝 Next Steps
          1. Review the changes carefully
          2. Run tests locally to verify the fixes
          3. Merge if everything looks good, or request changes

          ### ⚙️ Workflow Details
          - Triggered by: \`${{ github.event_name }}\`
          - Source branch: \`${{ steps.get_branch.outputs.source_branch }}\`
          - Target branch: \`${{ steps.get_branch.outputs.source_branch }}\` (will merge into the original failing branch)
          - Workflow run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ---
          🤖 Generated with [Gemini AI](https://ai.google.dev/)
          "

          # Create PR using gh CLI
          # Use the source branch (the one that failed) as the base
          gh pr create \
            --title "🤖 Auto-fix: Apply Gemini-suggested fixes for failing tests" \
            --body "${PR_BODY}" \
            --base "${{ steps.get_branch.outputs.source_branch }}" \
            --head "${{ steps.create_branch.outputs.branch_name }}"

          echo "✓ Pull request created successfully"

      - name: Upload patches as artifact
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: gemini-patches
          path: gemini-patches/
          retention-days: 7
          if-no-files-found: warn

      - name: Comment on original PR (if applicable)
        if: |
          steps.check_changes.outputs.has_changes == 'true' &&
          github.event.workflow_run.event == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Try to find the original PR number
            const payload = context.payload.workflow_run;
            if (!payload.pull_requests || payload.pull_requests.length === 0) {
              core.info('No PR associated with the workflow run');
              return;
            }

            const originalPR = payload.pull_requests[0].number;

            const comment = `## 🤖 Gemini Auto-Fix

            I've created a new PR with automated fixes for the failing tests detected in this PR.

            🔗 **Fix PR**: Check the open PRs for a PR created by Gemini Auto-Fix Bot

            The fixes were generated using AI analysis of the test failures.
            Please review the changes carefully before merging.
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: originalPR,
              body: comment,
            });

            core.info(`Comment posted to PR #${originalPR}`);
