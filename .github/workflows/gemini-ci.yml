name: Gemini Assisted CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-json-report

      - name: Run pytest with JSON report
        id: tests
        continue-on-error: true
        run: |
          pytest --json-report

      - name: Process pytest report with Gemini
        if: always()
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: |
          python ci/gemini_report.py --report .report.json --comment-file gemini_comment.md

      - name: Comment Gemini analysis on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const commentPath = 'gemini_comment.md';
            if (!fs.existsSync(commentPath)) {
              core.info('No Gemini comment file found; skipping PR comment.');
              return;
            }

            const body = fs.readFileSync(commentPath, 'utf8').trim();
            if (!body) {
              core.info('Gemini comment file was empty; skipping PR comment.');
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
            core.info('Gemini analysis comment posted to PR.');

      - name: Upload test report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: .report.json
          retention-days: 7

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: |
          exit 1
